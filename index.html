<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070d07">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PO Binder">
<meta name="description" content="Perfect Order — Pokémon Masterset Binder Tracker">
<link rel="manifest" id="pwa-manifest">
<link rel="icon" type="image/svg+xml" id="favicon-svg">
<link rel="apple-touch-icon" id="apple-icon">
<title>Perfect Order — Masterset Binder</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#3ddc32;--g2:#28a81e;--g3:#1a6612;--g4:rgba(61,220,50,.12);--g5:rgba(61,220,50,.06);
  --bg:#070d07;--s1:#0c140c;--s2:#111a11;--s3:#162016;--card:#0f180f;
  --b1:#1c2e1c;--b2:#253825;--b3:#304830;
  --t1:#d8f0d0;--t2:#8aab82;--t3:#4a6a44;--t4:#2a3e28;
  --ex:#00c8ff;--ir:#e040fb;--ur:#f8b400;--sir:#ff3d7f;--mhr:#ffd700;--rare:#aa88ff;
  --rh-color:#7ee8ff;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 85% 15%,rgba(61,220,50,.05) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 15% 85%,rgba(0,200,255,.03) 0%,transparent 55%);pointer-events:none;z-index:0}

/* OFFLINE BAR */
.offline-bar{display:none;background:rgba(255,200,0,.12);border-bottom:1px solid rgba(255,200,0,.25);padding:6px 20px;font-size:11px;color:#f0b800;text-align:center;letter-spacing:.04em}
.offline-bar.show{display:block}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(7,13,7,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--b2);box-shadow:0 1px 20px rgba(0,0,0,.5)}
.hdr-inner{display:flex;align-items:center;gap:14px;padding:0 20px;height:60px;max-width:1400px;margin:0 auto}
.logo-wrap{display:flex;align-items:center;gap:10px}
.zyhex{width:36px;height:36px;background:var(--s2);border:1px solid var(--b3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 12px rgba(61,220,50,.2)}
.logo-text{display:flex;flex-direction:column}
.logo-main{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--g);letter-spacing:.07em;line-height:1;text-shadow:0 0 18px rgba(61,220,50,.5)}
.logo-sub{font-size:9px;font-weight:600;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.stat-block{text-align:right}
.stat-n{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--g);line-height:1}
.stat-n small{font-size:12px;color:var(--t3);font-family:'Inter',sans-serif;font-weight:400}
.stat-l{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.pbar{width:110px;height:4px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:3px}
.pfill{height:100%;background:linear-gradient(90deg,var(--g3),var(--g));border-radius:2px;transition:width .5s ease}
.install-btn{display:none;align-items:center;gap:6px;padding:6px 12px;background:var(--g4);border:1px solid var(--g3);border-radius:8px;color:var(--g);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.install-btn:hover{background:rgba(61,220,50,.2)}
.install-btn.visible{display:flex}

/* TABS */
.tabs{background:var(--s1);border-bottom:1px solid var(--b1);display:flex;padding:0 20px}
.tab{font-size:13px;font-weight:600;padding:10px 18px;color:var(--t3);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;border-bottom:2px solid transparent;letter-spacing:.04em;transition:all .15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--g);border-bottom-color:var(--g);text-shadow:0 0 8px rgba(61,220,50,.4)}

/* CONTROLS */
.ctl-wrap{background:var(--s1);border-bottom:1px solid var(--b1)}
.ctl{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;align-items:center;max-width:1400px;margin:0 auto;width:100%}
.srch{position:relative;flex:1;min-width:150px;max-width:280px}
.srch input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 12px 7px 32px;color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;transition:border .15s}
.srch input:focus{outline:none;border-color:var(--g3);background:var(--s3)}
.srch input::placeholder{color:var(--t3)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
select{background:var(--s2);border:1px solid var(--b2);border-radius:7px;padding:7px 10px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
select:focus{outline:none;border-color:var(--g3)}
.fg{display:flex;gap:3px}
.fb{padding:7px 13px;background:transparent;border:1px solid var(--b2);border-radius:7px;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;letter-spacing:.04em}
.fb:hover{color:var(--t2);border-color:var(--b3)}
.fb.on{background:var(--g4);border-color:var(--g3);color:var(--g)}
.vg{display:flex;gap:3px;margin-left:auto}
.vb{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--b2);border-radius:7px;background:transparent;cursor:pointer;color:var(--t3);font-size:14px;transition:all .12s}
.vb:hover{border-color:var(--b3);color:var(--t2)}
.vb.on{border-color:var(--g3);color:var(--g);background:var(--g5)}
/* Price freshness indicator */
.pfresh{font-size:10px;color:var(--t3);padding:3px 8px;border-radius:5px;background:var(--s2);border:1px solid var(--b1);white-space:nowrap}
.pfresh.live{color:var(--g);border-color:var(--g3);background:var(--g5)}

/* MAIN LAYOUT */
.page{max-width:1400px;margin:0 auto;padding:16px 20px}

/* ── CARD PAIR (Normal + RH side by side) ── */
.cpair{display:contents}

/* GRID — now uses pair-aware columns */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.grid.lv{grid-template-columns:1fr;gap:5px}

/* ── CARD TILE ── */
.ct{border-radius:10px;background:var(--card);border:1px solid var(--b1);overflow:hidden;cursor:pointer;position:relative;transition:border-color .2s,transform .2s,box-shadow .2s;user-select:none}
.ct:hover{border-color:var(--b3);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.6)}
.ct.owned{border-color:var(--g)!important;box-shadow:0 0 12px rgba(61,220,50,.2)}
.ct.rh-owned:not(.owned){border-color:rgba(0,200,255,.35)!important;box-shadow:0 0 10px rgba(0,200,255,.12)}
.ct.owned.rh-owned{border-color:var(--g)!important;box-shadow:0 0 12px rgba(61,220,50,.2)}

/* Green tick */
.ct.owned .tick{opacity:1}
.tick{position:absolute;top:6px;right:6px;width:20px;height:20px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:5;opacity:0;transition:opacity .2s;box-shadow:0 0 8px rgba(61,220,50,.4)}
.tick svg{width:10px;height:10px;stroke:#070d07;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

/* Card image */
.cimgw{width:100%;aspect-ratio:2.5/3.5;position:relative;background:var(--s2);overflow:hidden}
.cimgw img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s,filter .3s;opacity:0}
.cimgw img.loaded{opacity:1;animation:fadeIn .3s ease forwards}
.ct:hover .cimgw img{transform:scale(1.04)}
.ct.owned .cimgw img{filter:brightness(1.05) saturate(1.1)}
/* Holo sheen */
.sheen{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.07) 50%,transparent 70%)}
.ct:hover .sheen{opacity:1}
/* ── RH ARROW BUTTON on tile ── */
.rh-btn{position:absolute;bottom:6px;right:6px;z-index:6;width:24px;height:24px;border-radius:50%;background:rgba(0,30,45,.85);border:1px solid rgba(0,200,255,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;backdrop-filter:blur(4px)}
.rh-btn:hover{background:rgba(0,200,255,.25);border-color:var(--rh-color);transform:scale(1.15)}
.rh-btn svg{width:11px;height:11px;fill:var(--rh-color)}
/* RH owned pip — small blue dot on top-left when RH is owned */
.rh-pip{position:absolute;top:6px;left:6px;width:14px;height:14px;border-radius:50%;background:var(--rh-color);box-shadow:0 0 6px rgba(0,200,255,.6);z-index:5;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.rh-pip svg{width:7px;height:7px;stroke:#070d07;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.ct.rh-owned .rh-pip{opacity:1}

/* ── MODAL image flip ── */
.mimg-viewer{position:relative;width:100%;overflow:hidden;border-radius:12px 12px 0 0}
.mimg-face{width:100%;aspect-ratio:2.5/3.5;background:var(--s2);position:relative;overflow:hidden}
.mimg-face img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.mimg-face img.loaded{opacity:1}
/* RH overlay on modal image */
.mimg-face.is-rh::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(125deg,transparent 0%,rgba(0,200,255,.15) 20%,rgba(180,80,255,.12) 35%,rgba(61,220,50,.1) 50%,rgba(255,180,0,.1) 65%,rgba(255,60,130,.12) 80%,transparent 100%);
  background-size:200% 200%;animation:rhShimmer 3s ease-in-out infinite;z-index:2;pointer-events:none
}
/* Flip toggle bar */
.mimg-toggle{display:flex;border-top:1px solid var(--b2)}
.mimg-toggle-btn{flex:1;padding:8px;background:var(--s2);border:none;color:var(--t3);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:5px}
.mimg-toggle-btn:first-child{border-right:1px solid var(--b2)}
.mimg-toggle-btn.active{background:var(--s3);color:var(--t1)}
.mimg-toggle-btn.active.rh-active{color:var(--rh-color)}

/* ── OWNED CARDS section in modal ── */
.mowned{display:flex;gap:8px;margin-bottom:16px}
.mown-btn{flex:1;padding:10px 12px;border-radius:8px;border:1px solid var(--b2);background:transparent;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:center;color:var(--t3);display:flex;align-items:center;justify-content:center;gap:6px}
.mown-btn:hover:not(.got){border-color:var(--b3);color:var(--t2)}
.mown-btn.got{border-color:var(--g);color:var(--g);background:var(--g4)}
.mown-btn.rh-own.got{border-color:var(--rh-color);color:var(--rh-color);background:rgba(0,200,255,.1)}
.mown-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mown-chk svg{width:8px;height:8px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .1s}
.mown-btn.got .mown-chk svg{opacity:1}
/* Placeholder */
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px}
.ph-art{width:72%;max-width:90px;filter:brightness(.85) saturate(.9)}
.ph-icon{font-size:32px}
.ph-name{font-size:9px;color:var(--t3);text-align:center;font-weight:600;line-height:1.3}
/* Rarity strip */
.rstrip{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;font-size:8px;font-weight:700;letter-spacing:.07em;text-align:center;z-index:2;backdrop-filter:blur(3px)}
.rC{background:rgba(0,0,0,.6);color:var(--t3)}
.rU{background:rgba(0,15,20,.65);color:#4ecdc4}
.rR{background:rgba(20,10,40,.7);color:var(--rare)}
.rex{background:rgba(0,15,25,.72);color:var(--ex);text-shadow:0 0 5px rgba(0,200,255,.4)}
.rIR{background:rgba(25,5,30,.72);color:var(--ir)}
.rUR{background:rgba(30,22,0,.72);color:var(--ur)}
.rSIR{background:rgba(30,0,15,.78);color:var(--sir);text-shadow:0 0 4px rgba(255,61,127,.3)}
.rMHR{background:rgba(20,16,0,.82);color:var(--mhr);text-shadow:0 0 5px rgba(255,215,0,.4)}
/* RH badge on strip */
.rh-badge{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;font-size:8px;font-weight:700;letter-spacing:.07em;text-align:center;z-index:2;backdrop-filter:blur(3px);background:rgba(0,30,40,.75);color:var(--rh-color);text-shadow:0 0 4px rgba(0,200,255,.4)}

/* Card info */
.ci{padding:7px 9px 8px}
.cnum{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.cname{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Price on tile */
.cpx{font-size:11px;font-weight:700;margin-top:4px;display:flex;align-items:baseline;gap:4px}
.cpx .pv{color:#90c060}
.cpx .pl{font-size:8px;color:var(--t3);font-weight:500}
.cpx.rh-px .pv{color:var(--rh-color)}
.cpx.loading .pv{color:var(--t4);animation:pulse 1.4s infinite}

/* OWNED overlay flash */
.ct::after{content:'✓';position:absolute;inset:0;background:rgba(61,220,50,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:var(--g);letter-spacing:.1em;opacity:0;pointer-events:none;transition:opacity .15s}
.ct.rh-tile::after{background:rgba(0,200,255,.15);color:var(--rh-color)}
.ct.flash::after{opacity:1}

/* LOADING SHIMMER */
.img-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;z-index:1}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes rhShimmer{
  0%{background-position:0% 0%;opacity:.7}
  50%{background-position:100% 100%;opacity:1}
  100%{background-position:0% 0%;opacity:.7}
}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* LIST VIEW */
.li{border-radius:8px;background:var(--card);border:1px solid var(--b1);padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s;user-select:none}
.li:hover{border-color:var(--b3)}
.li.owned{border-color:var(--g);background:rgba(61,220,50,.04)}
.li-th{width:36px;height:50px;border-radius:4px;object-fit:cover;background:var(--s2);flex-shrink:0}
.li-ph{width:36px;height:50px;border-radius:4px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.li-mid{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
.li-sub{font-size:10px;color:var(--t3);margin-top:2px}
.li-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.li-vc{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .12s}
.li-vcN{background:rgba(61,220,50,.07);color:var(--t3);border-color:var(--b2)}
.li-vcR{background:rgba(0,200,255,.07);color:#005580;border-color:var(--b2)}
.li-vcN.got{background:rgba(61,220,50,.2);color:var(--g);border-color:var(--g3)}
.li-vcR.got{background:rgba(0,200,255,.18);color:var(--rh-color);border-color:#004466}
.li-px{font-size:12px;color:#90c060;font-weight:700;flex-shrink:0;text-align:right;min-width:52px}
.li-px small{display:block;font-size:9px;color:var(--t3);font-weight:400}
.li-px.loading{color:var(--t4);animation:pulse 1.4s infinite}
.li-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:transparent;transition:all .15s}
.li.owned .li-dot{background:var(--g);border-color:var(--g);color:#070d07}

/* PRICES TAB */
.psec{border:1px solid var(--b2);border-radius:10px;margin-bottom:14px;overflow:hidden}
.phdr{background:var(--s2);padding:11px 16px;display:flex;justify-content:space-between;align-items:center}
.phdr-t{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--g);letter-spacing:.05em}
.phdr-s{font-size:10px;color:var(--t3)}
.prow{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--b1);font-size:13px;gap:12px}
.pname{color:var(--t2);flex:1;min-width:0}
.pvals{display:flex;align-items:center;gap:12px;flex-shrink:0}
.pmid{font-weight:700;font-size:15px;color:var(--t1)}
.prange{font-size:10px;color:var(--t4)}
.trend{font-size:10px;font-weight:700;padding:2px 8px;border-radius:9px;white-space:nowrap}
.tup{background:rgba(61,220,50,.12);color:var(--g)}
.tdn{background:rgba(255,80,80,.1);color:#ff6060}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
.mbg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;max-width:460px;width:100%;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 0 60px rgba(0,0,0,.8),0 0 24px rgba(61,220,50,.06)}
.mcls{position:absolute;top:10px;right:10px;background:var(--s2);border:1px solid var(--b1);border-radius:50%;width:28px;height:28px;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .15s}
.mcls:hover{color:var(--t1);border-color:var(--b3)}
/* Modal image pair */
.mimg-pair{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:12px 12px 0 0;overflow:hidden}
.mimg-single{width:100%;border-radius:12px 12px 0 0;overflow:hidden}
.mimg-slot{position:relative;aspect-ratio:2.5/3.5;background:var(--s2);overflow:hidden}
.mimg-slot img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.mimg-slot img.loaded{opacity:1}
.mimg-slot .img-shimmer{border-radius:0}
.mimg-slot-label{position:absolute;bottom:0;left:0;right:0;padding:4px;font-size:9px;font-weight:700;letter-spacing:.08em;text-align:center;backdrop-filter:blur(4px);z-index:3}
.mimg-slot-label.normal-lbl{background:rgba(0,0,0,.65);color:var(--t2)}
.mimg-slot-label.rh-lbl{background:rgba(0,30,45,.75);color:var(--rh-color)}
.mph{width:100%;aspect-ratio:2.5/3.5;background:var(--s2);border-radius:12px 12px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.mph img{width:48%;max-width:140px}
.mph .mph-icon{font-size:48px}
.mph span{font-size:16px;color:var(--t2);font-weight:600;font-family:'Rajdhani',sans-serif;letter-spacing:.05em}
/* Modal body */
.mbody{padding:16px}
.mtitle{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--g);letter-spacing:.05em;margin-bottom:2px}
.mmeta{font-size:11px;color:var(--t3);margin-bottom:14px;letter-spacing:.03em}
.msec{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.vtogs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.vtog{padding:9px 16px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;flex:1;text-align:center}
.vtog:hover:not(.got){border-color:var(--b3);color:var(--t2)}
.vtog.got{border-color:var(--g);color:var(--g);background:var(--g4)}
.vtog.rh-tog.got{border-color:var(--rh-color);color:var(--rh-color);background:rgba(0,200,255,.1)}
.mpt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.mpt td{padding:6px 4px;border-bottom:1px solid var(--b1);color:var(--t3)}
.mpt td:last-child{text-align:right;color:var(--t1);font-weight:600}
.mpt tr.rh-row td{color:var(--rh-color)}
.mpt tr.rh-row td:first-child{color:var(--t3)}
.mlink{display:block;margin-top:14px;padding:9px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;text-align:center;color:var(--g2);font-size:12px;font-weight:600;text-decoration:none;transition:border-color .15s}
.mlink:hover{border-color:var(--g3);color:var(--g)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;grid-column:1/-1}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--b3);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--t1);z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:520px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px}
  .hdr-right .stat-block,.hdr-right .pbar-wrap{display:none}
  .logo-main{font-size:18px}
  .ctl{padding:10px 12px}
  .page{padding:12px}
  .pfresh{display:none}
}
</style>
</head>

<div class="offline-bar" id="offline-bar">📡 Offline — showing cached data</div>

<header class="hdr">

</div>

</div>

  </div>
</div>

function vts(c) { return c.rh ? ['Normal','Reverse Holo'] : ['Normal']; }

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  let tot = 0, got = 0;
  CARDS.forEach(c => { const v = vts(c); tot += v.length; v.forEach(x => { if (owned[c.n+':'+x]) got++; }); });
  const pct = tot ? Math.round(got/tot*100) : 0;
  document.getElementById('sn').innerHTML = `${got} <small>/ ${tot}</small>`;
  document.getElementById('spct').textContent = pct + '%';

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const rf = document.getElementById('rf').value;
  const grid = document.getElementById('grid');
  const cards = CARDS.filter(c => {
    if (q && !c.name.toLowerCase().includes(q) && !c.n.includes(q)) return false;
    if (rf && c.r !== rf) return false;
    if (oF === 'owned' && !hasAny(c)) return false;
    if (oF === 'missing' && hasAll(c)) return false;
    return true;
  });
  updateStats();
  if (!cards.length) { grid.innerHTML = '<div class="empty">No cards found</div>'; return; }

  if (vM === 'list') {
    grid.className = 'grid lv';
    grid.innerHTML = cards.map(c => {
      const img = imgUrl(c.n) || (c.poke ? sprite(c.poke) : null);
      const p = tcgP[c.n];
      const normOwned = !!owned[c.n+':Normal'];
      const rhOwned = c.rh && !!owned[c.n+':Reverse Holo'];
      const priceStr = p?.mid != null ? `€${p.mid.toFixed(2)}` : '—';
      const ownedClass = (normOwned || rhOwned) ? ' owned' : '';
      return `<div class="li${ownedClass}" onclick="openModal('${c.n}')">
        ${img ? `<img class="li-th" src="${img}" alt="" loading="lazy" onerror="this.style.opacity=0">` : `<div class="li-ph">${TYPE_E[c.t]||'🃏'}</div>`}
        <div class="li-mid">
          <div class="li-name">${c.name}</div>
          <div class="li-sub">#${c.n} · ${R_LABEL[c.r]}</div>
          <div class="li-badges">
            <span class="li-vc li-vcN${normOwned?' got':''}" onclick="event.stopPropagation();toggleV('${c.n}','Normal');render()">Normal</span>
            ${c.rh ? `<span class="li-vc li-vcR${rhOwned?' got':''}" onclick="event.stopPropagation();toggleV('${c.n}','Reverse Holo');render()">🌟 RH</span>` : ''}
          </div>
        </div>
        <div class="li-px"><span>${priceStr}</span><small>market</small></div>
        <div class="li-dot">✓</div>
      </div>`;
    }).join('');
    return;
  }

  // GRID VIEW — one tile per card, RH arrow button on cards that have RH
  grid.className = 'grid';
  grid.innerHTML = cards.map(c => {
    const img = imgUrl(c.n);
    const sp = c.poke ? sprite(c.poke) : null;
    const p = tcgP[c.n];
    const normOwned = !!owned[c.n+':Normal'];
    const rhOwned = c.rh && !!owned[c.n+':Reverse Holo'];
    const normPrice = p?.mid != null ? `<div class="cpx"><span class="pv">€${p.mid.toFixed(2)}</span><span class="pl">market</span></div>` : `<div class="cpx"><span class="pv">—</span></div>`;

    // Border: full green if both owned, green if normal owned, blue glow if only RH owned
    let tileClass = 'ct';
    if (normOwned && rhOwned) tileClass += ' owned rh-owned';
    else if (normOwned) tileClass += ' owned';
    else if (rhOwned) tileClass += ' rh-owned';

    // RH arrow button (only for cards with RH variant)
    const rhBtn = c.rh ? `
      <div class="rh-pip"><svg viewBox="0 0 12 9"><polyline points="1,5 4,8 11,1"/></svg></div>
      <button class="rh-btn" onclick="event.stopPropagation();openModal('${c.n}',true)" title="View Reverse Holo">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 1l5 7H3l5-7z" opacity=".5"/><circle cx="8" cy="11.5" r="2.5"/><path d="M5.5 14.5q2.5-2 5 0" stroke-width="1.2" stroke="currentColor" fill="none" stroke-linecap="round"/></svg>
      </button>` : '';

    return `<div class="${tileClass}" onclick="quickToggle(event,'${c.n}','Normal')" oncontextmenu="event.preventDefault();openModal('${c.n}')">
      <div class="tick"><svg viewBox="0 0 12 9"><polyline points="1,5 4,8 11,1"/></svg></div>
      ${rhBtn}
      <div class="cimgw">
        ${img ? `<div class="img-shimmer"></div><img src="${img}" alt="${c.name}" loading="lazy" onload="this.previousSibling.style.display='none';this.classList.add('loaded')" onerror="this.previousSibling.style.display='none';this.style.display='none';this.nextSibling.style.display='flex'">` : ''}
        <div class="ph" style="${img?'display:none':''}">
          ${sp ? `<img class="ph-art" src="${sp}" alt="" loading="lazy" onerror="this.style.display='none'">` : `<span class="ph-icon">${TYPE_E[c.t]||'🃏'}</span>`}
          <span class="ph-name">${c.name}</span>
        </div>
        <div class="sheen"></div>
        <div class="rstrip r${c.r}">${R_LABEL[c.r]}</div>
      </div>
      <div class="ci">
        <div class="cnum">#${c.n} · ${c.t}</div>
        <div class="cname">${c.name}</div>
        ${normPrice}
      </div>
    </div>`;
  }).join('');
}

// Quick-toggle Normal on single tap
function quickToggle(e, n, variant) {
  const k = n + ':' + variant;
  owned[k] = !owned[k];
  if (!owned[k]) delete owned[k];
  save();
  const el = e.currentTarget;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 350);
  // Update classes live without full re-render
  const normOwned = !!owned[n+':Normal'];
  const card = CARDS.find(c => c.n === n);
  const rhOwned = card?.rh && !!owned[n+':Reverse Holo'];
  el.classList.toggle('owned', normOwned);
  el.classList.toggle('rh-owned', rhOwned);
  updateStats();
}

// ── TOGGLE (from modal) ────────────────────────────────────────
function toggleV(n, v) {
  const k = n + ':' + v;
  owned[k] = !owned[k];
  if (!owned[k]) delete owned[k];
  save();
  if (cur?.n === n) renderMOwned(cur);
  render();
}

function renderMOwned(c) {

// ── CACHE LAYER ───────────────────────────────────────────────
const CACHE_KEY = 'por4_tcg_v2';
const CACHE_TTL = 6 * 60 * 60 * 1000;

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const {ts, prices, images} = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return {prices, images, ts};
  } catch(e) { return null; }
}
function saveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(), prices:tcgP, images:tcgImg})); } catch(e) {}
}

// ── PRICE FETCH (background, non-blocking) ───────────────────
let fetchDone = false;

async function loadPrices() {
  // Apply cache first (on top of baseline)
  const cached = loadCache();
  if (cached) {
    Object.assign(tcgP, cached.prices);
    Object.assign(tcgImg, cached.images);
    render();
    const ageMin = Math.round((Date.now() - cached.ts) / 60000);
    const el = document.getElementById('pfresh');
    el.textContent = `Prices cached · ${ageMin}m ago`;
    el.classList.add('live');
    // Skip network if under 30 min old
    if (Date.now() - cached.ts < 30 * 60 * 1000) { fetchDone = true; return; }
  }
  if (fetchDone) return;
  fetchDone = true;
  const el = document.getElementById('pfresh');
  el.textContent = 'Fetching live prices…';
  try {
    // Use set ID sv9pt5 (Perfect Order EN set code) for faster targeted lookup
    const r = await fetch('https://api.pokemontcg.io/v2/cards?q=set.id:me3&pageSize=250&orderBy=number&select=number,images,tcgplayer');
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    if (d.data?.length) {
      d.data.forEach(card => {
        const num = String(parseInt(card.number)).padStart(3,'0');
        if (card.images?.large) tcgImg[num] = card.images.large;
        else if (card.images?.small) tcgImg[num] = card.images.small;
        const p = card.tcgplayer?.prices;
        if (p) {
          const norm = p.normal||p.holofoil||p.unlimitedHolofoil||{};
          const rh = p.reverseHolofoil||{};
          tcgP[num] = {low:norm.low??null, mid:norm.market??null, high:norm.high??null, rh:rh.market??null};
        }
      });
      saveCache();
      render();
      el.textContent = '✓ Live prices';
      el.classList.add('live');
      showToast('✓ Live prices updated');
    } else {
      el.textContent = cached ? 'Using cached prices' : 'Using baseline prices';
    }
  } catch(e) {
    el.textContent = cached ? `Cached · offline` : 'Baseline prices';
    fetchDone = false;
  }
}

}
